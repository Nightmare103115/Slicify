<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slicer | Gigapixel Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --glow: #4cc9f0; --glass: rgba(10, 10, 15, 0.85); }
        body { margin: 0; padding: 20px; min-height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; background-color: #000; }

        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -2; opacity: 0; transform: scale(1); transition: opacity 2s ease-in-out, transform 12s linear; }
        .bg-layer.active { opacity: 1; transform: scale(1.1); }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: -1; }

        h1 { text-shadow: 0 0 15px var(--glow); letter-spacing: 4px; margin-bottom: 20px; }

        #uploadBtn { margin-bottom: 20px; padding: 15px 30px; font-size: 1.1rem; }

        #preview-container { position: relative; display: none; margin: 0 auto; border: 2px solid var(--glow); background: rgba(0,0,0,0.8); max-width: 512px; width: 100%; height: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #preview-canvas { width: 100%; height: auto; display: block; }
        #grid-svg { position: absolute; top:0; left:0; width:100%; height:100%; cursor: crosshair; }
        .grid-zone { fill: transparent; transition: 0.2s; }
        .grid-zone:hover { fill: rgba(76, 201, 240, 0.3); }

        #sector-popup { position: fixed; display: none; background: var(--glass); border: 1px solid var(--glow); padding: 15px; border-radius: 8px; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.8); text-align: center; backdrop-filter: blur(5px); }
        #sector-popup p { margin: 0 0 10px 0; font-weight: bold; }

        .panel { background: var(--glass); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; width: 95%; max-width: 900px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; justify-content: center; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; color: var(--glow); margin-bottom: 5px; text-transform: uppercase; }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid var(--glow); color: white; padding: 10px; border-radius: 4px; }
        input[type="number"] { width: 80px; }
        
        .btn { padding: 10px 20px; background: transparent; border: 2px solid var(--glow); color: white; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--glow); color: black; box-shadow: 0 0 15px var(--glow); }
        .btn-action { border-color: #4cc9f0; }
        .btn-download-all { border-color: #f72585; color: #f72585; }
        .btn-download-all:hover { background: #f72585; color: white; box-shadow: 0 0 15px #f72585;}

        #status-bar { margin-top: 15px; color: #f72585; font-family: monospace; font-size: 1rem; text-align: center; }

        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; width: 95%; max-width: 1200px; }
        .slice-card { background: var(--glass); padding: 15px; border: 1px solid #333; text-align: center; border-radius: 8px; }
        .slice-card img { width: 100%; height: auto; border: 1px solid #444; margin-bottom: 10px; background: #000; }
        .slice-card p { margin: 5px 0; font-family: monospace; color: #ccc; font-size: 0.9rem; }
        .slice-card .res-text { color: var(--glow); font-size: 0.8rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="bg1" class="bg-layer active"></div>
    <div id="bg2" class="bg-layer"></div>
    <div class="overlay"></div>

    <h1>IMAGE SLICER</h1>

    <button class="btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">LOAD MASSIVE SOURCE FILE</button>
    <input type="file" id="fileInput" style="display: none;" accept="image/*">

    <div id="preview-container">
        <canvas id="preview-canvas"></canvas>
        <svg id="grid-svg"></svg>
    </div>

    <div id="sector-popup">
        <p id="popup-text">Download Sector A1?</p>
        <button class="btn" style="padding: 5px 15px;" id="popup-confirm">YES</button>
        <button class="btn" style="padding: 5px 15px; border-color: #888;" onclick="closePopup()">NO</button>
    </div>

    <div id="controls" class="panel" style="display: none;">
        <div class="input-row">
            <div class="input-group">
                <label>Master Project Name</label>
                <input type="text" id="masterName" placeholder="e.g. Nebula">
            </div>
            <div class="input-group">
                <label>Vertical Lines</label>
                <input type="number" id="vSlices" value="0" min="0">
            </div>
            <div class="input-group">
                <label>Horizontal Lines</label>
                <input type="number" id="hSlices" value="0" min="0">
            </div>
            <div class="input-group">
                <label>Format</label>
                <select id="imgFormat">
                    <option value="image/png">PNG</option>
                    <option value="image/jpeg">JPEG</option>
                </select>
            </div>
            <button class="btn btn-action" onclick="processSlicesQueue()">EXECUTE SLICE</button>
            <button class="btn btn-download-all" id="dlAllBtn" style="display:none;" onclick="downloadZip()">DOWNLOAD ALL (.ZIP)</button>
        </div>
        <div id="status-bar">Awaiting Coordinates...</div>
    </div>

    <div id="results"></div>

    <script>
        const bgImages = [
            "https://upload.wikimedia.org/wikipedia/commons/7/7f/ISS-43_Earth_view_from_the_ISS.jpg",
            "https://www.nasa.gov/wp-content/uploads/2019/04/black_hole_xray_layout.jpg",
            "https://external-preview.redd.it/oluRUXCVMJCCK2Qyg_atG7_MoK5OZF6cKNS6huFsvDQ.jpg?auto=webp&s=9db7738a09770b313c3982a6c6652055f58cd81e",
            "https://www.thisiscolossal.com/wp-content/uploads/2020/08/cupola-with-clouds-and-ocean.jpg",
            "https://images-assets.nasa.gov/image/PIA04921/PIA04921~medium.jpg",
            "https://assets.science.nasa.gov/dynamicimage/assets/science/astro/universe/internal_resources/403/Tycho-1.jpeg?w=1041&h=1042&fit=clip&crop=faces%2Cfocalpoint",
            "https://assets.science.nasa.gov/dynamicimage/assets/science/missions/hubble/releases/2021/11/STScI-01FM5SQHAAKGSQ6A24031KDE5G.tif?w=1802&h=1087&fit=crop&crop=faces%2Cfocalpoint",
            "https://assets.science.nasa.gov/dynamicimage/assets/science/missions/hubble/releases/2025/02/STScI-01JJADV6KT3NE2J628WC4PTPJH.tif?w=2000&h=1877&fit=crop&crop=faces%2Cfocalpoint",
            "https://assets.science.nasa.gov/dynamicimage/assets/science/astro/universe/internal_resources/402/Carina_Nebula-1.jpeg?w=1600&h=927&fit=clip&crop=faces%2Cfocalpoint",
            "https://science.nasa.gov/wp-content/uploads/2023/04/hubble-ultra-deep-field-jpg.webp"
        ];
        
        let bgIndex = 1, activeBg = 1;
        const bg1 = document.getElementById('bg1'), bg2 = document.getElementById('bg2');
        bg1.style.backgroundImage = `url('${bgImages[0]}')`;

        function cycleBackground() {
            const nextImg = `url('${bgImages[bgIndex]}')`;
            if (activeBg === 1) { bg2.style.backgroundImage = nextImg; bg2.classList.add('active'); bg1.classList.remove('active'); activeBg = 2; } 
            else { bg1.style.backgroundImage = nextImg; bg1.classList.add('active'); bg2.classList.remove('active'); activeBg = 1; }
            bgIndex = (bgIndex + 1) % bgImages.length;
        }
        setInterval(cycleBackground, 10000);

        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('preview-container');
        const resultsDiv = document.getElementById('results');
        const statusBar = document.getElementById('status-bar');
        const popup = document.getElementById('sector-popup');
        const gridSvg = document.getElementById('grid-svg');

        let currentFile = null;
        let sourceWidth = 0;
        let sourceHeight = 0;
        let currentSlices = [];

        fileInput.addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file) return;
            
            currentFile = file;
            statusBar.innerText = "[ DECODING GIGAPIXEL HEADERS... ]";
            document.getElementById('uploadBtn').innerText = "LOADING...";

            try {
                const metadataBmp = await createImageBitmap(file);
                sourceWidth = metadataBmp.width;
                sourceHeight = metadataBmp.height;
                metadataBmp.close();

                const maxW = 512;
                let preW = sourceWidth, preH = sourceHeight;
                if (preW > maxW) {
                    const ratio = maxW / preW;
                    preW = maxW;
                    preH = Math.round(preH * ratio);
                }

                const previewBmp = await createImageBitmap(file, { resizeWidth: preW, resizeHeight: preH });
                
                container.style.display = 'block';
                document.getElementById('controls').style.display = 'block';
                document.getElementById('uploadBtn').innerText = "CHANGE SOURCE IMAGE";
                
                container.style.width = `${preW}px`;
                canvas.width = preW;
                canvas.height = preH;
                ctx.drawImage(previewBmp, 0, 0);
                previewBmp.close();

                statusBar.innerText = `[ READY ] Source Detected: ${sourceWidth} x ${sourceHeight} Pixels`;
                updateGrid();

            } catch (err) {
                console.error(err);
                alert("BROWSER HARD LIMIT EXCEEDED: Even with chunk-streaming, this file exceeds your browser's absolute hard-coded safety limits. Try a slightly smaller image.");
                document.getElementById('uploadBtn').innerText = "LOAD FAILED - TRY SMALLER FILE";
                statusBar.innerText = "CRITICAL MEMORY FAULT.";
            }
        });

        function updateGrid() {
            const vL = parseInt(document.getElementById('vSlices').value) || 0;
            const hL = parseInt(document.getElementById('hSlices').value) || 0;
            const rect = canvas.getBoundingClientRect();
            gridSvg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
            gridSvg.innerHTML = '';

            const cw = rect.width / (vL + 1);
            const rh = rect.height / (hL + 1);

            for (let r = 0; r <= hL; r++) {
                for (let c = 0; c <= vL; c++) {
                    const zone = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    zone.setAttribute("x", c * cw); zone.setAttribute("y", r * rh);
                    zone.setAttribute("width", cw); zone.setAttribute("height", rh);
                    zone.setAttribute("class", "grid-zone");
                    zone.onclick = (e) => showPopup(e, c, r);
                    gridSvg.appendChild(zone);
                }
            }
            for (let i = 1; i <= vL; i++) drawLine(cw * i, 0, cw * i, rect.height);
            for (let i = 1; i <= hL; i++) drawLine(0, rh * i, rect.width, rh * i);
        }

        function drawLine(x1, y1, x2, y2) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
            l.setAttribute("stroke", "red"); l.setAttribute("stroke-width", "1.5"); l.style.pointerEvents = "none";
            gridSvg.appendChild(l);
        }

        function showPopup(e, col, row) {
            const label = `${String.fromCharCode(65+col)}${row+1}`;
            const master = document.getElementById('masterName').value || "Project";
            document.getElementById('popup-text').innerText = `Extract ${master}_${label}?`;
            popup.style.left = (e.clientX + 15) + "px";
            popup.style.top = (e.clientY + 15) + "px";
            popup.style.display = "block";
            
            document.getElementById('popup-confirm').onclick = async () => {
                closePopup();
                await sliceAndDownloadSingle(col, row, label, master);
            };
        }
        function closePopup() { popup.style.display = "none"; }
        window.addEventListener('click', (e) => { if (e.target.tagName !== 'rect' && !popup.contains(e.target)) closePopup(); });

async function extractChunk(col, row) {
    const vS = (parseInt(document.getElementById('vSlices').value) || 0) + 1;
    const hS = (parseInt(document.getElementById('hSlices').value) || 0) + 1;
    
    const sliceW = Math.floor(sourceWidth / vS);
    const sliceH = Math.floor(sourceHeight / hS);
    const startX = col * sliceW;
    const startY = row * sliceH;

    const chunkBmp = await createImageBitmap(currentFile, startX, startY, sliceW, sliceH);
    
    const tCanvas = document.createElement('canvas');
    tCanvas.width = sliceW; tCanvas.height = sliceH;
    const tCtx = tCanvas.getContext('2d');
    tCtx.drawImage(chunkBmp, 0, 0);
    chunkBmp.close();

    const format = document.getElementById('imgFormat').value;
    const blob = await new Promise(resolve => tCanvas.toBlob(resolve, format));
    
    return { blob: blob, width: sliceW, height: sliceH };
}

async function sliceAndDownloadSingle(col, row, label, masterName) {
    statusBar.innerText = `[ EXTRACTING CHUNK ${label} ]...`;
    const chunk = await extractChunk(col, row);
    const ext = document.getElementById('imgFormat').value === 'image/png' ? 'png' : 'jpg';
    
    const link = document.createElement('a');
    link.href = URL.createObjectURL(chunk.blob);
    link.download = `${masterName}_${label}.${ext}`;
    link.click();
    
    URL.revokeObjectURL(link.href);
    statusBar.innerText = `[ COMPLETE ] ${masterName}_${label} extracted.`;
}

        async function processSlicesQueue() {
            resultsDiv.innerHTML = "";
            currentSlices = [];
            document.getElementById('dlAllBtn').style.display = "none";
            
            const vS = (parseInt(document.getElementById('vSlices').value) || 0) + 1;
            const hS = (parseInt(document.getElementById('hSlices').value) || 0) + 1;
            const total = vS * hS;
            const master = document.getElementById('masterName').value || "Project";
            const ext = document.getElementById('imgFormat').value === 'image/png' ? 'png' : 'jpg';

            for (let r = 0; r < hS; r++) {
                for (let c = 0; c < vS; c++) {
                    const label = `${String.fromCharCode(65+c)}${r+1}`;
                    const fileName = `${master}_${label}`;
                    const remaining = total - (r * vS + c);
                    
                    statusBar.innerText = `[ STREAMING ] Extracting ${fileName}... (${remaining} left)`;
                    
                    await new Promise(resolve => setTimeout(resolve, 50)); 
                    
                    try {
                        const chunk = await extractChunk(c, r);
                        currentSlices.push({ data: chunk.dataUrl, name: fileName });

                        const card = document.createElement('div');
                        card.className = 'slice-card';
                        card.innerHTML = `
                            <img src="${chunk.dataUrl}">
                            <p>${fileName}</p>
                            <div class="res-text">${chunk.width} x ${chunk.height} px</div>
                            <a href="${chunk.dataUrl}" download="${fileName}.${ext}" class="btn">DOWNLOAD</a>
                        `;
                        resultsDiv.appendChild(card);
                    } catch (err) {
                        console.error("Chunk failed:", err);
                        statusBar.innerText = `[ ERROR ] Failed to extract chunk ${label}.`;
                        return;
                    }
                }
            }
            statusBar.innerText = "[ PROCESSING COMPLETE ] All gigapixel sectors extracted.";
            document.getElementById('dlAllBtn').style.display = "inline-block";
        }

        async function downloadZip() {
            const zip = new JSZip();
            const ext = document.getElementById('imgFormat').value === 'image/png' ? 'png' : 'jpg';
            const master = document.getElementById('masterName').value || "Project";

            statusBar.innerText = "[ PACKAGING ZIP ARCHIVE... ]";

            currentSlices.forEach(slice => {
                const base64Data = slice.data.split(',')[1];
                zip.file(`${slice.name}.${ext}`, base64Data, {base64: true});
            });

            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `${master}_Full_Archive.zip`;
            link.click();
            
            statusBar.innerText = "[ DOWNLOAD COMPLETE ] Archive secured.";
        }

        document.getElementById('vSlices').oninput = updateGrid;
        document.getElementById('hSlices').oninput = updateGrid;
        window.onresize = updateGrid;
    </script>
</body>
</html>
